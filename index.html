<!DOCTYPE html>
<html>
<head>
  <title>Random Video Chat</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

  <h1>Random Video Chat</h1>

  <button onclick="start()">Start Finding Stranger</button>

  <p id="status">Idle</p>

  <div id="meet"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCHtDRiuJiYQ1bPyOCuIlsrntU01G4cokQ",
      authDomain: "video-chat-app-251c4.firebaseapp.com",
      projectId: "video-chat-app-251c4",
      storageBucket: "video-chat-app-251c4.firebasestorage.app",
      messagingSenderId: "1092380086005",
      appId: "1:1092380086005:web:2da32930f520208cb87fbc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const waitingRef = db.collection("waiting");

    let myId = Math.random().toString(36).substring(2);
    let currentRoom = null;
  </script>

  <!-- Jitsi -->
  <script src="https://meet.jit.si/external_api.js"></script>

  <script>
    async function start() {
      document.getElementById("status").innerText = "Searching...";

      // Step 1: check if someone is waiting
      const snapshot = await waitingRef.get();

      let partner = null;

      snapshot.forEach(doc => {
        if (doc.id !== myId) {
          partner = doc.id;
        }
      });

      if (!partner) {
        // No one waiting → add yourself
        await waitingRef.doc(myId).set({
          time: Date.now()
        });

        document.getElementById("status").innerText = "Waiting for stranger...";

        // keep checking
        waitingRef.onSnapshot((snap) => {
          snap.docChanges().forEach(change => {
            if (change.type === "removed" && currentRoom) {
              startCall(currentRoom);
            }
          });
        });

      } else {
        // Match found → remove partner
        await waitingRef.doc(partner).delete();

        const room = "room_" + Math.floor(Math.random() * 100000);

        currentRoom = room;
        startCall(room);
      }
    }

    function startCall(room) {
      if (window.started) return;
      window.started = true;

      document.getElementById("status").innerText = "Connected";

      new JitsiMeetExternalAPI("meet.jit.si", {
        roomName: room,
        width: "100%",
        height: 500,
        parentNode: document.querySelector("#meet")
      });
    }
  </script>

</body>
</html>
