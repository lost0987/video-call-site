<!DOCTYPE html>
<html>
<head>
  <title>My Video Call</title>
</head>

<body style="text-align:center; font-family:sans-serif;">
  <h1>My Free Video Call Website</h1>
  <p>Share this page link with your friend to start a call</p>

  <div id="meet"></div>

  <script src="https://meet.jit.si/external_api.js"></script>

  <script>
    // This creates a random room every time
    const roomName = "Room" + Math.floor(Math.random() * 100000);

    const domain = "meet.jit.si";

    const options = {
      roomName: roomName,
      width: "100%",
      height: 500,
      parentNode: document.querySelector('#meet'),
    };

    const api = new JitsiMeetExternalAPI(domain, options);
  </script>

</body>
</html>
