  <script>
    function startCall() {
      const roomName = document.getElementById("roomInput").value;

      if (!roomName) {
        alert("Please enter a room name");
        return;
      }

      const domain = "meet.jit.si";

      const options = {
        roomName: roomName,
        width: "100%",
        height: 500,
        parentNode: document.querySelector('#meet'),
      };

      new JitsiMeetExternalAPI(domain, options);
    }
