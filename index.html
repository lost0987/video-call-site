<!DOCTYPE html>
<html>
<head>
  <title>Random Video Chat</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

  <h1>Random Video Chat</h1>

  <button onclick="startChat()">Start Finding Stranger</button>

  <p id="status">Idle</p>

  <div id="meet"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCHtDRiuJiYQ1bPyOCuIlsrntU01G4cokQ",
      authDomain: "video-chat-app-251c4.firebaseapp.com",
      projectId: "video-chat-app-251c4",
      storageBucket: "video-chat-app-251c4.firebasestorage.app",
      messagingSenderId: "1092380086005",
      appId: "1:1092380086005:web:2da32930f520208cb87fbc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const queueRef = db.collection("queue");

    let currentRoom = null;
    let myDoc = null;
    let listening = false;
  </script>

  <!-- Jitsi -->
  <script src="https://meet.jit.si/external_api.js"></script>

  <script>
    async function startChat() {
      document.getElementById("status").innerText = "Searching...";

      // create unique user entry
      const userId = Math.random().toString(36).substring(2);

      const docRef = queueRef.doc(userId);

      const snapshot = await queueRef.get();

      let partner = null;

      snapshot.forEach(doc => {
        if (!partner) {
          partner = doc.id;
        }
      });

      if (partner) {
        // match found → remove partner
        await queueRef.doc(partner).delete();

        createRoom();
      } else {
        // no partner → join queue
        await docRef.set({
          time: Date.now()
        });

        myDoc = docRef;

        document.getElementById("status").innerText = "Waiting for stranger...";

        if (!listening) {
          listening = true;

          queueRef.onSnapshot(() => {
            queueRef.get().then(snap => {
              if (snap.empty) return;
            });
          });
        }
      }
    }

    function createRoom() {
      if (currentRoom) return;

      currentRoom = "room_" + Math.floor(Math.random() * 100000);

      document.getElementById("status").innerText = "Connected";

      new JitsiMeetExternalAPI("meet.jit.si", {
        roomName: currentRoom,
        width: "100%",
        height: 500,
        parentNode: document.querySelector("#meet")
      });

      // cleanup queue
      if (myDoc) myDoc.delete();
    }
  </script>

</body>
</html>
