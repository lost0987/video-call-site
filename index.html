<!DOCTYPE html>
<html>
<head>
  <title>Random Video Chat</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

  <h1>Random Video Chat</h1>

  <button onclick="startChat()">Start Finding Stranger</button>

  <p id="status">Idle</p>

  <div id="meet"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCHtDRiuJiYQ1bPyOCuIlsrntU01G4cokQ",
      authDomain: "video-chat-app-251c4.firebaseapp.com",
      projectId: "video-chat-app-251c4",
      storageBucket: "video-chat-app-251c4.firebasestorage.app",
      messagingSenderId: "1092380086005",
      appId: "1:1092380086005:web:2da32930f520208cb87fbc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const queueRef = db.collection("queue");
    const matchRef = db.collection("match");

    let myId = Math.random().toString(36).substring(2);
    let currentRoom = null;
    let matched = false;
  </script>

  <!-- Jitsi -->
  <script src="https://meet.jit.si/external_api.js"></script>

  <script>
    async function startChat() {
      document.getElementById("status").innerText = "Searching...";

      const myDoc = queueRef.doc(myId);

      try {
        const snapshot = await queueRef.get();

        let partner = null;

        snapshot.forEach(doc => {
          if (doc.id !== myId && !partner) {
            partner = doc.id;
          }
        });

        if (partner) {

          // 🔥 CREATE SINGLE SHARED ROOM
          const room = "room_" + Math.floor(Math.random() * 100000);

          // 🔥 STORE MATCH FOR BOTH USERS
          await matchRef.doc(partner).set({ room });
          await matchRef.doc(myId).set({ room });

          // remove partner from queue
          await queueRef.doc(partner).delete();

          startCall(room);

        } else {

          await myDoc.set({ time: Date.now() });

          document.getElementById("status").innerText = "Waiting for stranger...";

          // REAL-TIME LISTENER FOR MATCH
          matchRef.doc(myId).onSnapshot((doc) => {
            if (doc.exists && !matched) {
              matched = true;
              startCall(doc.data().room);
            }
          });
        }

      } catch (err) {
        console.log(err);
        document.getElementById("status").innerText = "Error connecting";
      }
    }

    function startCall(room) {
      if (currentRoom) return;

      currentRoom = room;

      document.getElementById("status").innerText = "Connected";

      new JitsiMeetExternalAPI("meet.jit.si", {
        roomName: room,
        width: "100%",
        height: 500,
        parentNode: document.querySelector("#meet")
      });
    }
  </script>

</body>
</html>
