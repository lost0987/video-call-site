<!DOCTYPE html>
<html>
<head>
  <title>Random Video Chat</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

  <h1>Random Video Chat</h1>

  <button onclick="startChat()">Start Finding Stranger</button>

  <p id="status">Idle</p>

  <div id="meet"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCHtDRiuJiYQ1bPyOCuIlsrntU01G4cokQ",
      authDomain: "video-chat-app-251c4.firebaseapp.com",
      projectId: "video-chat-app-251c4",
      storageBucket: "video-chat-app-251c4.firebasestorage.app",
      messagingSenderId: "1092380086005",
      appId: "1:1092380086005:web:2da32930f520208cb87fbc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const queueRef = db.collection("queue");

    let currentRoom = null;
    let myId = Math.random().toString(36).substring(2);
    let matched = false;
  </script>

  <!-- Jitsi -->
  <script src="https://meet.jit.si/external_api.js"></script>

  <script>
    async function startChat() {
      document.getElementById("status").innerText = "Searching...";

      const myDoc = queueRef.doc(myId);

      try {
        // STEP 1: check if someone already waiting
        const snapshot = await queueRef.get();

        let partner = null;

        snapshot.forEach(doc => {
          if (doc.id !== myId && !partner) {
            partner = doc.id;
          }
        });

        if (partner) {
          // STEP 2: lock partner immediately
          await queueRef.doc(partner).delete();

          createRoom();
        } else {
          // STEP 3: join queue
          await myDoc.set({
            time: Date.now()
          });

          document.getElementById("status").innerText = "Waiting for stranger...";

          // STEP 4: real-time match listener
          queueRef.onSnapshot((snap) => {
            if (matched) return;

            snap.docChanges().forEach(change => {
              if (change.type === "removed") {
                matched = true;
                createRoom();
              }
            });
          });
        }

      } catch (err) {
        console.log(err);
        document.getElementById("status").innerText = "Error connecting";
      }
    }

    function createRoom() {
      if (currentRoom) return;

      currentRoom = "room_" + Math.floor(Math.random() * 100000);

      document.getElementById("status").innerText = "Connected";

      new JitsiMeetExternalAPI("meet.jit.si", {
        roomName: currentRoom,
        width: "100%",
        height: 500,
        parentNode: document.querySelector("#meet")
      });
    }
  </script>

</body>
</html>
